spring.application.name=WorkMate
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/workmate_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
server.port=${PORT:8080}
app.jwt.secret=${JWT_SECRET:talentrix_solution_workmate_hrms_system_jwt_secret_key_2026_lts}
app.jwt.expiration=86400000
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring AI / Groq Config
spring.ai.openai.api-key=${GROQ_API_KEY:mock-key}
spring.ai.openai.base-url=https://api.groq.com/openai/v1
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.4